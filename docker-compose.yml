version: '3.8'
services:
  snet:
    image: snet:latest
    container_name: snet
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    privileged: true              # only needed if container manages iptables
    volumes:
      - ./configs:/configs
      - ./logs:/logs
    command:
      - --config
      - /configs/config.yaml
      - --port
      - "8053"
      # - --mode gateway
      # - --iface wlp0s20f3        # uncomment for gateway mode
    restart: unless-stopped